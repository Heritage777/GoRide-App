<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <link rel="stylesheet" href="./project-css/dash-pass.css">
</head>
<body>
   <div id="passenger-dashboard" class="dash-container hidden">
    <aside class="side-panel">
        <div class="side-top">
            <div class="brand-sm">Go<span>Rïde</span></div>
            
            <div class="user-profile">
                <div class="avatar-circle">H</div>
                <div class="user-info">
                    <p class="u-name">Heritage</p>
                    <p class="u-status">Verified Passenger</p>
                </div>
            </div>

            <div class="booking-section">
                <div class="search-box">
                    <div class="search-row">
                        <i class="fas fa-circle-dot pickup-dot"></i>
                        <input type="text" value="Current Location" readonly>
                    </div>
                    <div class="route-line"></div>
                    <div class="search-row">
                        <i class="fas fa-location-arrow drop-dot"></i>
                        <input type="text" id="destination" placeholder="Where to?">
                    </div>
                </div>

                <div class="ride-category">
                    <p class="label">Suggested Rides</p>
                    <div class="ride-card active">
                        <i class="fas fa-car"></i>
                        <div class="details">
                            <span class="type">GoRïde Basic</span>
                            <span class="eta">3 min away</span>
                        </div>
                        <span class="price">₦1,200</span>
                    </div>
                    <div class="ride-card">
                        <i class="fas fa-crown"></i>
                        <div class="details">
                            <span class="type">GoRïde Lux</span>
                            <span class="eta">6 min away</span>
                        </div>
                        <span class="price">₦2,800</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="side-bottom">
            <button class="confirm-btn" onclick="startRideSimulation()">
                Confirm Booking
            </button>
            <button class="logout-link" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <main class="map-view">
        <div id="status-bar" class="live-status hidden">
            <div class="pulse"></div>
            <span id="live-text">Finding your driver...</span>
        </div>

        <div id="canvas-area">
            <svg class="simulation-grid" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
                <path id="path-line" d="M100,400 Q400,100 700,400" fill="none" stroke="rgba(255,159,67,0.2)" stroke-width="4" stroke-dasharray="10,10" />
                <circle cx="100" cy="400" r="10" fill="#2ecc71" />
                <circle cx="700" cy="400" r="10" fill="#ff4757" />
                <g id="car-icon" class="hidden">
                    <rect x="-15" y="-10" width="30" height="20" rx="4" fill="#ff9f43" />
                    <text font-family="FontAwesome" font-size="18px" fill="black" text-anchor="middle" dominant-baseline="middle">&#xf1b9;</text>
                </g>
            </svg>
        </div>
    </main>
</div>
</div>
</body>
</html>
